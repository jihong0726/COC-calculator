<!DOCTYPE html>
<html lang="zh-Hans" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COC 账号全景指挥舱 - TH18 最终版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        coco: { bg: '#0f172a', card: '#1e293b', accent: '#3b82f6', purple: '#8b5cf6', green: '#22c55e', orange: '#f97316', red: '#ef4444' }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .progress-track { @apply h-3 bg-slate-700/50 rounded-full overflow-hidden; }
            .progress-fill { @apply h-full rounded-full transition-all duration-1000 ease-out; }
            .level-tag { @apply px-2 py-0.5 rounded text-[11px] font-mono border whitespace-nowrap; }
            .tag-maxed { @apply bg-blue-500/20 text-blue-400 border-blue-500/30; }
            .tag-normal { @apply bg-slate-700 text-slate-300 border-slate-600; }
            .tag-lagging { @apply bg-yellow-500/20 text-yellow-400 border-yellow-500/30; }
            .tag-critical { @apply bg-red-500/20 text-red-400 border-red-500/30; }
        }
        body { background-color: theme('colors.coco.bg'); }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-8 font-sans antialiased">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight mb-4">
                COC 账号全景指挥舱 <span class="text-coco-accent">Dashboard</span>
            </h1>
            
            <div class="bg-coco-card border border-slate-700/50 rounded-xl p-4 shadow-lg flex flex-col md:flex-row gap-4 items-start md:items-center mb-6">
                <textarea id="jsonInput" class="w-full md:w-2/3 h-20 bg-slate-900 border border-slate-700 rounded-lg p-3 text-xs font-mono text-slate-300 focus:outline-none focus:border-coco-accent" placeholder="请将你的 JSON 数据粘贴在这里..."></textarea>
                <div class="w-full md:w-1/3 flex flex-col gap-2">
                    <button id="btnAnalyze" class="w-full bg-coco-accent hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition-colors flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                        一键解析我的数据
                    </button>
                    <div class="text-xs text-slate-500 flex justify-between">
                        <span id="playerTag">等待导入...</span>
                        <span id="targetTH" class="font-bold text-coco-accent">目标: TH18 满防</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-4 bg-coco-card rounded-2xl shadow-2xl p-6 border border-slate-700/50 relative overflow-hidden">
                <div class="absolute top-0 right-0 -mt-10 -mr-10 w-32 h-32 bg-coco-accent/20 blur-[60px] rounded-full"></div>
                <h2 class="text-xl font-bold text-white mb-6">综合加权完成度</h2>
                <div class="relative w-full max-w-[280px] mx-auto aspect-square">
                    <canvas id="overallChart"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span class="text-5xl font-black text-white leading-none" id="overallText">0%</span>
                        <span class="text-sm text-slate-400 mt-2 font-medium">综合评分</span>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-coco-card rounded-2xl p-6 border-t-4 border-coco-purple shadow-lg flex flex-col justify-center">
                    <div class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2">防御总进度</div>
                    <div class="text-2xl font-bold text-white" id="statDef">等待解析...</div>
                </div>
                <div class="bg-coco-card rounded-2xl p-6 border-t-4 border-coco-green shadow-lg flex flex-col justify-center">
                    <div class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2">经济与科技基础</div>
                    <div class="text-2xl font-bold text-white" id="statEco">等待解析...</div>
                </div>
                <div class="bg-coco-card rounded-2xl p-6 border-t-4 border-coco-orange shadow-lg flex flex-col justify-center">
                    <div class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2">陷阱与城墙</div>
                    <div class="text-2xl font-bold text-white" id="statTraps">等待解析...</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-8">
            <div class="bg-coco-card rounded-2xl p-5 shadow-lg border border-slate-700/50">
                <div class="w-full h-1 bg-gradient-to-r from-purple-500 to-indigo-500 -mt-5 -mx-5 mb-5 rounded-t-2xl"></div>
                <h3 class="text-lg font-bold text-white mb-5">🛡️ 核心重火力 (Core)</h3>
                <div class="space-y-6" id="list-core"><div class="text-slate-500 text-sm text-center py-10">输入 JSON 后显示...</div></div>
            </div>
            <div class="bg-coco-card rounded-2xl p-5 shadow-lg border border-slate-700/50">
                <div class="w-full h-1 bg-gradient-to-r from-blue-500 to-cyan-500 -mt-5 -mx-5 mb-5 rounded-t-2xl"></div>
                <h3 class="text-lg font-bold text-white mb-5">🏹 常规防御 (Standard)</h3>
                <div class="space-y-6" id="list-standard"><div class="text-slate-500 text-sm text-center py-10">输入 JSON 后显示...</div></div>
            </div>
            <div class="bg-coco-card rounded-2xl p-5 shadow-lg border border-slate-700/50">
                <div class="w-full h-1 bg-gradient-to-r from-green-500 to-emerald-500 -mt-5 -mx-5 mb-5 rounded-t-2xl"></div>
                <h3 class="text-lg font-bold text-white mb-5">💰 资源与军队 (Eco)</h3>
                <div class="space-y-6" id="list-eco"><div class="text-slate-500 text-sm text-center py-10">输入 JSON 后显示...</div></div>
            </div>
            <div class="bg-coco-card rounded-2xl p-5 shadow-lg border border-slate-700/50">
                <div class="w-full h-1 bg-gradient-to-r from-orange-500 to-yellow-500 -mt-5 -mx-5 mb-5 rounded-t-2xl"></div>
                <h3 class="text-lg font-bold text-white mb-5">💣 陷阱与其它 (Traps)</h3>
                <div class="space-y-6" id="list-traps"><div class="text-slate-500 text-sm text-center py-10">输入 JSON 后显示...</div></div>
            </div>
        </div>
    </div>

    <script>
        // 1. 静态数据库 (TH18 满防标准)
        const COC_DB = {
            1000031: { name: "天鹰火炮", cat: "core", weight: 5, maxLvl: 7 },
            1000067: { name: "投石机", cat: "core", weight: 5, maxLvl: 6 },
            1000027: { name: "地狱塔", cat: "core", weight: 4, maxLvl: 12 },
            1000021: { name: "X连弩", cat: "core", weight: 4, maxLvl: 12 },
            1000077: { name: "巨石碑", cat: "core", weight: 5, maxLvl: 4 },
            1000072: { name: "法术塔", cat: "core", weight: 4, maxLvl: 4 }, 
            
            1000012: { name: "防空火箭", cat: "standard", weight: 3, maxLvl: 16 },
            1000009: { name: "箭塔", cat: "standard", weight: 2, maxLvl: 21 },
            1000008: { name: "加农炮", cat: "standard", weight: 2, maxLvl: 21 },
            1000011: { name: "法师塔", cat: "standard", weight: 3, maxLvl: 17 },
            1000013: { name: "迫击炮", cat: "standard", weight: 2, maxLvl: 18 },
            1000019: { name: "隐藏电塔", cat: "standard", weight: 2, maxLvl: 17 },
            1000028: { name: "吹风机", cat: "standard", weight: 2, maxLvl: 7 },
            1000032: { name: "炸弹塔", cat: "standard", weight: 3, maxLvl: 12 },
            1000084: { name: "多管箭塔", cat: "standard", weight: 4, maxLvl: 4 },
            1000085: { name: "跳弹加农炮", cat: "standard", weight: 4, maxLvl: 4 },
            
            1000000: { name: "兵营", cat: "eco", weight: 3, maxLvl: 13 },
            1000007: { name: "实验室", cat: "eco", weight: 3, maxLvl: 16 },
            1000068: { name: "战宠小屋", cat: "eco", weight: 3, maxLvl: 12 },
            1000070: { name: "铁匠铺", cat: "eco", weight: 3, maxLvl: 9 },
            1000004: { name: "金矿", cat: "eco", weight: 1, maxLvl: 17 },
            1000002: { name: "圣水收集器", cat: "eco", weight: 1, maxLvl: 17 },
            1000005: { name: "储金罐", cat: "eco", weight: 2, maxLvl: 19 },
            1000003: { name: "圣水瓶", cat: "eco", weight: 2, maxLvl: 19 },
            1000024: { name: "暗黑重油罐", cat: "eco", weight: 2, maxLvl: 13 },
            1000014: { name: "部落城堡", cat: "eco", weight: 3, maxLvl: 14 },
            1000006: { name: "训练营", cat: "eco", weight: 3, maxLvl: 19 },
            1000020: { name: "法术工厂", cat: "eco", weight: 3, maxLvl: 9 },
            
            1000010: { name: "城墙", cat: "traps", weight: 0.1, maxLvl: 19 },
            12000000: { name: "隐形炸弹", cat: "traps", weight: 1, maxLvl: 14 },
            12000002: { name: "巨型炸弹", cat: "traps", weight: 1.5, maxLvl: 12 },
            12000005: { name: "空中炸弹", cat: "traps", weight: 1.5, maxLvl: 13 },
            12000006: { name: "搜空地雷", cat: "traps", weight: 1.5, maxLvl: 8 },
            12000016: { name: "飓风陷阱", cat: "traps", weight: 2, maxLvl: 3 }
        };

        let myChart = null; 

        // 2. 核心解析函数 (Raw JSON -> UI Data)
        function analyzeData() {
            const rawText = document.getElementById('jsonInput').value.trim();
            if(!rawText) return alert("请先粘贴 JSON 数据！");
            
            let data;
            try { data = JSON.parse(rawText); } 
            catch (e) { return alert("JSON 格式错误，请重新复制。"); }

            document.getElementById('playerTag').textContent = "Tag: " + (data.tag || "未知");
            
            const inventory = new Map();
            const allItems = [...(data.buildings || []), ...(data.traps || [])];
            
            allItems.forEach(item => {
                const id = item.data;
                const lvl = item.lvl || 0;
                const count = item.cnt || 1;
                
                if(!COC_DB[id]) return;

                if(!inventory.has(id)) inventory.set(id, []);
                for(let i=0; i<count; i++) inventory.get(id).push(lvl);
            });

            const uiData = { core: [], standard: [], eco: [], traps: [] };
            let totalScore = 0;
            let totalWeight = 0;
            let catScores = { core: {s:0, w:0}, standard: {s:0, w:0}, eco: {s:0, w:0}, traps: {s:0, w:0} };

            inventory.forEach((levelsArr, id) => {
                const dbInfo = COC_DB[id];
                const maxLvl = dbInfo.maxLvl; 
                
                const levelCounts = {};
                levelsArr.forEach(l => { levelCounts[l] = (levelCounts[l] || 0) + 1; });
                
                let currentTotalLvl = 0;
                const maxTotalLvl = levelsArr.length * maxLvl;
                const tags = [];
                
                Object.keys(levelCounts).map(Number).sort((a,b)=>b-a).forEach(lvl => {
                    currentTotalLvl += (Math.min(lvl, maxLvl) * levelCounts[lvl]); 
                    
                    let type = "normal";
                    if(lvl >= maxLvl) type = "maxed";
                    else if(maxLvl - lvl === 1) type = "normal";
                    else if(maxLvl - lvl === 2) type = "lagging";
                    else type = "critical";

                    tags.push({
                        text: `Lv${lvl}${lvl >= maxLvl ? '(满)' : ''} × ${levelCounts[lvl]}`,
                        type: type
                    });
                });

                const percent = maxTotalLvl === 0 ? 100 : Math.floor((currentTotalLvl / maxTotalLvl) * 100);
                const isMaxed = percent === 100;
                
                const itemWeight = dbInfo.weight * levelsArr.length;
                totalScore += (percent * itemWeight);
                totalWeight += itemWeight;
                
                catScores[dbInfo.cat].s += (percent * itemWeight);
                catScores[dbInfo.cat].w += itemWeight;

                let color = dbInfo.cat === 'core' ? 'coco-purple' : dbInfo.cat === 'eco' ? 'coco-green' : dbInfo.cat === 'traps' ? 'coco-orange' : 'coco-accent';
                if(!isMaxed && percent < 75 && dbInfo.cat !== 'eco') color = 'red-500'; 

                uiData[dbInfo.cat].push({
                    name: dbInfo.name,
                    percent: percent,
                    status: isMaxed ? "已满" : percent < 75 ? "滞后" : "未满",
                    color: color,
                    isMaxed: isMaxed,
                    tags: tags
                });
            });

            const finalPercentage = totalWeight === 0 ? 0 : Math.floor(totalScore / totalWeight);
            
            const safeCalc = (cat) => catScores[cat].w === 0 ? 0 : Math.floor(catScores[cat].s / catScores[cat].w);
            document.getElementById('statDef').textContent = Math.floor((safeCalc('core') + safeCalc('standard'))/2) + "%";
            document.getElementById('statEco').textContent = safeCalc('eco') + "%";
            document.getElementById('statTraps').textContent = safeCalc('traps') + "%";

            renderUI(finalPercentage, uiData);
        }

        // 3. UI 渲染逻辑
        function renderUI(overallPercent, catData) {
            if(myChart) myChart.destroy();
            const ctx = document.getElementById('overallChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { datasets: [{ data: [overallPercent, 100 - overallPercent], backgroundColor: ['#3b82f6', '#1e293b'], borderWidth: 0, borderRadius: 10, cutout: '80%' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false, tooltip: false }, animation: { animateRotate: true, duration: 1500 } }
            });

            document.getElementById('overallText').textContent = overallPercent + '%';

            function renderList(containerId, items) {
                const container = document.getElementById(containerId);
                if(items.length === 0) { container.innerHTML = '<div class="text-slate-500 text-sm">暂无数据</div>'; return; }
                
                items.sort((a,b) => a.percent - b.percent);

                container.innerHTML = items.map(item => {
                    const tagsHtml = item.tags.map(tag => {
                        const tagClass = tag.type === 'maxed' ? 'tag-maxed' : tag.type === 'critical' ? 'tag-critical' : tag.type === 'lagging' ? 'tag-lagging' : 'tag-normal';
                        return `<span class="level-tag ${tagClass}">${tag.text}</span>`;
                    }).join('');

                    const bgColorClass = item.isMaxed ? 'bg-slate-600/50' : `bg-${item.color}`;
                    const textColorClass = item.isMaxed ? 'text-slate-500' : item.color === 'red-500' ? 'text-red-400' : `text-${item.color}`;

                    return `
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-slate-300 font-medium">${item.name}</span>
                                <span class="font-mono ${textColorClass}">${item.percent}% (${item.status})</span>
                            </div>
                            <div class="progress-track mb-2">
                                <div class="progress-fill ${bgColorClass}" style="width: ${item.percent}%"></div>
                            </div>
                            <div class="flex flex-wrap gap-1.5">${tagsHtml}</div>
                        </div>
                    `;
                }).join('');
            }

            renderList('list-core', catData.core);
            renderList('list-standard', catData.standard);
            renderList('list-eco', catData.eco);
            renderList('list-traps', catData.traps);
        }

        document.getElementById('btnAnalyze').addEventListener('click', analyzeData);

        // 页面刚加载时画一个空的灰圈
        const ctx = document.getElementById('overallChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { datasets: [{ data: [0, 100], backgroundColor: ['#3b82f6', '#1e293b'], borderWidth: 0, borderRadius: 10, cutout: '80%' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false, tooltip: false } }
        });
    </script>
</body>
</html>
