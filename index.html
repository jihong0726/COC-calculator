<!DOCTYPE html>
<html lang="zh-Hans" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COC 全景指挥舱 V7.0 - 视觉实战版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        coco: { bg: '#090d15', card: '#131b2c', accent: '#3b82f6', purple: '#9333ea', green: '#16a34a', orange: '#d97706', red: '#dc2626', pink: '#db2777', cyan: '#06b6d4' }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .progress-track { @apply h-2 bg-slate-800/80 rounded-full overflow-hidden shadow-inner; }
            .progress-fill { @apply h-full rounded-full transition-all duration-1000 ease-out relative; }
            .level-tag { @apply px-2 py-0.5 rounded text-[10px] font-mono border whitespace-nowrap; }
            .tag-maxed { @apply bg-slate-800/80 text-slate-500 border-slate-700/80; } 
            .tag-normal { @apply bg-slate-700/80 text-slate-300 border-slate-600; }
            .tag-lagging { @apply bg-orange-900/40 text-orange-400 border-orange-700/50; }
            .tag-critical { @apply bg-red-900/40 text-red-400 border-red-700/50; }
            .glass { @apply bg-opacity-80 backdrop-blur-2xl border-slate-800/60 shadow-lg; }
            
            /* 建筑图标占位符及样式 */
            .item-icon { @apply w-10 h-10 rounded-lg object-contain bg-slate-800/50 p-1 border border-slate-700/50 shrink-0; }
            
            /* 动态网格，适应更多分类 */
            .auto-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-6 lg:p-8 font-sans antialiased bg-coco-bg">

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-8">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(59,130,246,0.6)]">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5"></path></svg>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-black text-white tracking-tight">部落冲突 <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">全景指挥舱</span></h1>
                    <p class="text-xs text-slate-400 tracking-wider mt-1">V7.0 视觉图鉴版 | 智能过滤冷板凳装备</p>
                </div>
            </div>
            
            <div class="bg-coco-card border rounded-2xl p-4 shadow-xl flex flex-col md:flex-row gap-4 items-center glass">
                <textarea id="jsonInput" class="w-full md:w-3/4 h-16 bg-slate-900 border border-slate-700/80 rounded-xl p-3 text-xs font-mono text-slate-400 focus:outline-none focus:border-coco-accent" placeholder="在此粘贴导出的 JSON 源码..."></textarea>
                <div class="w-full md:w-1/4 space-y-2">
                    <button id="btnAnalyze" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        <span>导入并解析</span>
                    </button>
                    <div class="text-[11px] font-bold px-1 text-slate-500 text-center" id="playerTag">等待导入数据...</div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-3 bg-coco-card rounded-3xl p-6 border relative shadow-xl overflow-hidden glass flex flex-col items-center justify-center">
                <div class="absolute -top-16 -left-16 w-40 h-40 bg-blue-500/10 blur-[50px] rounded-full"></div>
                <h2 class="text-xs font-bold text-slate-400 mb-4 text-center">综合战力总进度</h2>
                <div class="relative w-full max-w-[140px] aspect-square">
                    <canvas id="overallChart"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center mt-2">
                        <span class="text-4xl font-black text-white" id="overallText">0%</span>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-6 bg-coco-card rounded-3xl p-6 border shadow-xl glass flex flex-col justify-center relative overflow-hidden">
                <div class="absolute right-0 bottom-0 w-64 h-64 bg-red-500/5 blur-[80px] rounded-full pointer-events-none"></div>
                <div class="flex items-center gap-2 mb-4">
                    <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>
                    <h3 class="text-xs font-bold text-slate-300 uppercase">Action Item (下一步推荐升级)</h3>
                </div>
                <div class="flex items-center gap-4">
                    <img id="urgentIcon" src="https://placehold.co/100x100/1e293b/334155?text=..." class="w-16 h-16 rounded-xl border border-slate-700 bg-slate-800 object-contain p-1" alt="icon">
                    <div>
                        <h2 class="text-2xl md:text-3xl font-black text-white" id="insightTitle">等待解析...</h2>
                        <p class="text-sm text-slate-400 mt-1" id="insightDesc">导入数据后，系统将锁定拖后腿最严重的防守核心。</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 flex flex-col gap-4">
                <div class="bg-coco-card rounded-2xl p-4 border-l-4 border-orange-500 shadow-xl glass flex-1 flex flex-col justify-center">
                    <p class="text-[10px] font-bold text-slate-500 mb-1">墙块待刷 (Wall Tracker)</p>
                    <div class="flex items-baseline gap-1"><span class="text-3xl font-black text-white" id="wallCount">--</span><span class="text-xs text-slate-500">块</span></div>
                    <div class="mt-2 h-1.5 w-full bg-slate-800 rounded-full"><div id="wallProgress" class="h-full bg-orange-500 w-0"></div></div>
                </div>
                <div class="bg-coco-card rounded-2xl p-4 border-l-4 border-cyan-500 shadow-xl glass flex-1 flex flex-col justify-center">
                    <p class="text-[10px] font-bold text-slate-500 mb-1">装备智能过滤 (Smart Filter)</p>
                    <div class="text-sm font-bold text-cyan-400" id="equipFilterStatus">已自动忽略 Lv1~Lv2 冷板凳装备</div>
                </div>
            </div>
        </div>

        <div class="auto-grid">
            <div class="flex flex-col gap-3">
                <div class="flex justify-between px-2"><h3 class="font-black text-purple-400 text-sm">🛡️ 核心重火力</h3><span class="text-xs text-slate-500 font-mono font-bold" id="score-core">0%</span></div>
                <div class="bg-coco-card rounded-3xl p-4 border glass flex flex-col gap-4 flex-grow" id="list-core"></div>
            </div>
            <div class="flex flex-col gap-3">
                <div class="flex justify-between px-2"><h3 class="font-black text-blue-400 text-sm">🏹 常规防御</h3><span class="text-xs text-slate-500 font-mono font-bold" id="score-standard">0%</span></div>
                <div class="bg-coco-card rounded-3xl p-4 border glass flex flex-col gap-4 flex-grow" id="list-standard"></div>
            </div>
            <div class="flex flex-col gap-3">
                <div class="flex justify-between px-2"><h3 class="font-black text-pink-400 text-sm">🧪 科技与英雄</h3><span class="text-xs text-slate-500 font-mono font-bold" id="score-tech">0%</span></div>
                <div class="bg-coco-card rounded-3xl p-4 border glass flex flex-col gap-4 flex-grow" id="list-tech"></div>
            </div>
            <div class="flex flex-col gap-3">
                <div class="flex justify-between px-2"><h3 class="font-black text-cyan-400 text-sm">⚒️ 铁匠铺 (装备)</h3><span class="text-xs text-slate-500 font-mono font-bold" id="score-equip">0%</span></div>
                <div class="bg-coco-card rounded-3xl p-4 border glass flex flex-col gap-4 flex-grow" id="list-equip"></div>
            </div>
            <div class="flex flex-col gap-3">
                <div class="flex justify-between px-2"><h3 class="font-black text-green-400 text-sm">💰 资源与基建</h3><span class="text-xs text-slate-500 font-mono font-bold" id="score-eco">0%</span></div>
                <div class="bg-coco-card rounded-3xl p-4 border glass flex flex-col gap-4 flex-grow" id="list-eco"></div>
            </div>
            <div class="flex flex-col gap-3">
                <div class="flex justify-between px-2"><h3 class="font-black text-orange-400 text-sm">💣 陷阱体系</h3><span class="text-xs text-slate-500 font-mono font-bold" id="score-traps">0%</span></div>
                <div class="bg-coco-card rounded-3xl p-4 border glass flex flex-col gap-4 flex-grow" id="list-traps"></div>
            </div>
        </div>
    </div>

    <script>
        // 数据库升级：增加 icon 图像支持 (采用通用高质量维基图片链接)
        const COC_DB = {
            1000031: { name: "天鹰火炮", cat: "core", weight: 5, max: 7, icon: "https://static.wikia.nocookie.net/clashofclans/images/c/c5/Eagle_Artillery7.png" },
            1000067: { name: "投石机", cat: "core", weight: 5, max: 6, icon: "https://static.wikia.nocookie.net/clashofclans/images/c/cb/Scattershot4.png" },
            1000027: { name: "地狱之塔", cat: "core", weight: 4, max: 12, icon: "https://static.wikia.nocookie.net/clashofclans/images/3/30/Inferno_Tower10_Multi.png" },
            1000021: { name: "X连弩", cat: "core", weight: 4, max: 12, icon: "https://static.wikia.nocookie.net/clashofclans/images/6/67/X-Bow11_Ground.png" },
            1000077: { name: "巨石碑", cat: "core", weight: 5, max: 4, icon: "https://static.wikia.nocookie.net/clashofclans/images/0/05/Monolith3.png" },
            1000072: { name: "法术塔", cat: "core", weight: 4, max: 4, icon: "https://static.wikia.nocookie.net/clashofclans/images/f/f3/Spell_Tower3.png" },
            1000097: { name: "合成防御集群", cat: "core", weight: 5, max: 4, icon: "https://static.wikia.nocookie.net/clashofclans/images/f/fe/Multi-Archer_Tower2.png" },
            
            1000012: { name: "防空火箭", cat: "standard", weight: 3, max: 16, icon: "https://static.wikia.nocookie.net/clashofclans/images/b/ba/Air_Defense14.png" },
            1000009: { name: "箭塔", cat: "standard", weight: 2, max: 21, icon: "https://static.wikia.nocookie.net/clashofclans/images/6/66/Archer_Tower21.png" },
            1000008: { name: "加农炮", cat: "standard", weight: 2, max: 21, icon: "https://static.wikia.nocookie.net/clashofclans/images/9/91/Cannon21.png" },
            1000011: { name: "法师塔", cat: "standard", weight: 3, max: 17, icon: "https://static.wikia.nocookie.net/clashofclans/images/1/15/Wizard_Tower16.png" },
            1000019: { name: "隐藏电磁塔", cat: "standard", weight: 2, max: 17, icon: "https://static.wikia.nocookie.net/clashofclans/images/b/b1/Hidden_Tesla14.png" },
            
            28000000: { name: "野蛮人之王", cat: "tech", weight: 5, max: 105, icon: "https://static.wikia.nocookie.net/clashofclans/images/8/87/Barbarian_King_info.png" },
            28000001: { name: "弓箭女皇", cat: "tech", weight: 5, max: 105, icon: "https://static.wikia.nocookie.net/clashofclans/images/e/ed/Archer_Queen_info.png" },
            28000002: { name: "大守护者", cat: "tech", weight: 5, max: 80, icon: "https://static.wikia.nocookie.net/clashofclans/images/a/a2/Grand_Warden_info.png" },
            28000004: { name: "飞盾战神", cat: "tech", weight: 5, max: 55, icon: "https://static.wikia.nocookie.net/clashofclans/images/a/ae/Royal_Champion_info.png" }
        };

        // Fallback 图片
        const DEFAULT_ICON = "https://placehold.co/100x100/1e293b/475569?text=COC";

        let myChart = null;

        function analyzeData() {
            const rawText = document.getElementById('jsonInput').value.trim();
            if(!rawText) return;
            let data;
            try { data = JSON.parse(rawText); } catch (e) { return alert("JSON 格式错误"); }

            document.getElementById('playerTag').textContent = "TAG: " + (data.tag || "Unknown");
            
            const inventory = new Map();
            const allItems = [
                ...(data.buildings || []), ...(data.traps || []), ...(data.units || []), 
                ...(data.spells || []), ...(data.heroes || []), ...(data.siege_machines || []),
                ...(data.pets || []), ...(data.equipment || [])
            ];
            
            let wallTotal = 0, wallMax = 0;
            let ignoredEquipCount = 0;

            allItems.forEach(item => {
                if (item.data === 1000010) {
                    const c = item.cnt || 1;
                    wallTotal += c;
                    if ((item.lvl || 0) >= 19) wallMax += c; // TH18 假定 19级墙
                    return; // 墙不进入主循环
                }

                const strId = String(item.data);
                
                // 【核心优化点】：装备分类与过滤
                if (strId.startsWith("9000")) {
                    const lvl = item.lvl || 0;
                    // 如果装备等级小于 3 级，直接认定为“不使用的冷板凳装备”，彻底忽略不计入进度！
                    if (lvl < 3) {
                        ignoredEquipCount++;
                        return; 
                    }
                    if(!COC_DB[item.data]) COC_DB[item.data] = { name: "主力装备 " + strId.slice(-3), cat: "equip", weight: 2, max: 27, icon: DEFAULT_ICON };
                }

                // 动态注册未知项目
                if(!COC_DB[item.data]) {
                    if (strId.startsWith("4000")) COC_DB[item.data] = { name: "兵种/战车 " + strId.slice(-3), cat: "tech", weight: 1, max: 14, icon: DEFAULT_ICON };
                    else if (strId.startsWith("2600")) COC_DB[item.data] = { name: "法术 " + strId.slice(-3), cat: "tech", weight: 1, max: 12, icon: DEFAULT_ICON };
                    else if (strId.startsWith("7300")) COC_DB[item.data] = { name: "战宠 " + strId.slice(-3), cat: "tech", weight: 2, max: 15, icon: DEFAULT_ICON };
                    else if (strId.startsWith("1000")) COC_DB[item.data] = { name: "常规建筑", cat: "eco", weight: 1, max: 15, icon: DEFAULT_ICON }; // 兜底
                    else return; 
                }

                if(!inventory.has(item.data)) inventory.set(item.data, []);
                for(let i=0; i<(item.cnt || 1); i++) inventory.get(item.data).push(item.lvl || 0);
            });

            document.getElementById('equipFilterStatus').textContent = `已自动过滤 ${ignoredEquipCount} 件 Lv1~Lv2 闲置装备`;
            document.getElementById('wallCount').textContent = wallTotal > 0 ? (wallTotal - wallMax) : 0;
            document.getElementById('wallProgress').style.width = wallTotal > 0 ? Math.floor((wallMax/wallTotal)*100) + '%' : '0%';

            const uiData = { core: [], standard: [], eco: [], traps: [], tech: [], equip: [] };
            let totalS = 0, totalW = 0;
            let cats = { core: {s:0, w:0}, standard: {s:0, w:0}, eco: {s:0, w:0}, traps: {s:0, w:0}, tech: {s:0, w:0}, equip: {s:0, w:0} };
            
            let urgentTarget = null;

            inventory.forEach((lvls, id) => {
                const info = COC_DB[id];
                const levelCounts = {};
                lvls.forEach(l => levelCounts[l] = (levelCounts[l] || 0) + 1);
                
                let curL = 0, maxL = lvls.length * info.max;
                const tags = [];
                Object.keys(levelCounts).sort((a,b)=>b-a).forEach(l => {
                    const lvl = parseInt(l);
                    curL += Math.min(lvl, info.max) * levelCounts[lvl];
                    tags.push({ text: `Lv${lvl}${lvl>=info.max?'(M)':''}×${levelCounts[lvl]}`, type: lvl>=info.max?'maxed':(info.max-lvl<=1?'normal':(info.max-lvl<=2?'lagging':'critical')) });
                });

                const p = maxL === 0 ? 100 : Math.floor((curL/maxL)*100);
                const isMaxed = p === 100;

                const weight = info.weight * lvls.length;
                totalS += p * weight; totalW += weight;
                cats[info.cat].s += p * weight; cats[info.cat].w += weight;

                // 寻找最紧急升级目标 (只看核心或常规防御)
                if (!isMaxed && (info.cat === 'core' || info.cat === 'standard')) {
                    if (!urgentTarget || p < urgentTarget.p) urgentTarget = { name: info.name, p: p, icon: info.icon || DEFAULT_ICON, max: info.max, minLvl: Math.min(...lvls) };
                }

                uiData[info.cat].push({ 
                    name: info.name, p, isMaxed, icon: info.icon || DEFAULT_ICON,
                    color: info.cat==='core'?'purple':(info.cat==='eco'?'green':(info.cat==='traps'?'orange':(info.cat==='tech'?'pink':(info.cat==='equip'?'cyan':'blue')))), 
                    tags 
                });
            });

            // 渲染下一步行动
            if (urgentTarget) {
                document.getElementById('urgentIcon').src = urgentTarget.icon;
                document.getElementById('insightTitle').innerHTML = `<span class="text-red-400">${urgentTarget.name}</span>`;
                document.getElementById('insightDesc').innerHTML = `当前最低仅 <b>Lv${urgentTarget.minLvl}</b> (目标 Lv${urgentTarget.max})。综合进度 ${urgentTarget.p}%，严重破坏防御阵型下限，建议立刻升级。`;
            } else {
                document.getElementById('insightTitle').textContent = "防御体系已全满";
                document.getElementById('insightDesc').textContent = "未检测到防御短板，请关注科技与装备的打磨。";
            }

            const finalP = totalW === 0 ? 0 : Math.floor(totalS / totalW);
            ['core', 'standard', 'eco', 'traps', 'tech', 'equip'].forEach(cat => {
                const s = cats[cat].w === 0 ? 0 : Math.floor(cats[cat].s / cats[cat].w);
                document.getElementById(`score-${cat}`).textContent = s + '%';
            });

            renderUI(finalP, uiData);
        }

        function renderUI(p, data) {
            if(myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('overallChart'), {
                type: 'doughnut',
                data: { datasets: [{ data: [p, 100-p], backgroundColor: ['#3b82f6', '#161d2f'], borderWidth: 0, borderRadius: 20, cutout: '82%' }] },
                options: { plugins: { legend: false, tooltip: false }, animation: { duration: 2000, easing: 'easeOutQuart' } }
            });
            document.getElementById('overallText').textContent = p + '%';

            ['core', 'standard', 'eco', 'traps', 'tech', 'equip'].forEach(cat => {
                const list = document.getElementById(`list-${cat}`);
                const notMaxed = data[cat].filter(i => !i.isMaxed).sort((a,b)=>a.p-b.p);
                const maxed = data[cat].filter(i => i.isMaxed);

                let html = '';
                // 渲染未满项目 (增加图标)
                html += notMaxed.map(item => `
                    <div class="flex gap-3 items-center group">
                        <img src="${item.icon}" onerror="this.src='${DEFAULT_ICON}'" class="item-icon" alt="${item.name}">
                        <div class="flex-grow min-w-0">
                            <div class="flex justify-between items-end mb-1">
                                <span class="text-xs font-bold text-slate-200 truncate pr-2">${item.name}</span>
                                <span class="text-[10px] font-mono font-bold text-${item.p < 75 ? 'red-400' : 'slate-400'}">${item.p}%</span>
                            </div>
                            <div class="progress-track mb-1.5"><div class="progress-fill bg-${item.color}-500" style="width: ${item.p}%"></div></div>
                            <div class="flex flex-wrap gap-1">${item.tags.map(t => `<span class="level-tag tag-${t.type}">${t.text}</span>`).join('')}</div>
                        </div>
                    </div>
                `).join('');

                // 渲染已满项目池 (无图极简)
                if (maxed.length > 0) {
                    html += `
                    <div class="mt-2 pt-3 border-t border-slate-700/50">
                        <p class="text-[10px] font-bold text-slate-500 mb-2 flex items-center gap-1">✅ 已满级 (${maxed.length})</p>
                        <div class="flex flex-wrap gap-1">
                            ${maxed.map(item => `<span class="px-1.5 py-0.5 bg-slate-800/40 text-slate-500 text-[9px] rounded border border-slate-700/50 cursor-help" title="已达到当前大本营满级标准">${item.name}</span>`).join('')}
                        </div>
                    </div>`;
                }
                if (html === '') html = `<div class="text-slate-600 text-xs text-center py-6">无数据或全部忽略</div>`;
                list.innerHTML = html;
            });
        }

        document.getElementById('btnAnalyze').addEventListener('click', analyzeData);

        const ctx = document.getElementById('overallChart').getContext('2d');
        myChart = new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: [0,100], backgroundColor: ['#3b82f6', '#161d2f'], borderWidth: 0, borderRadius: 20, cutout: '82%' }] }});
    </script>
</body>
</html>
